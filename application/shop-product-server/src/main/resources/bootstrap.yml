# ============================================
# Day05 bootstrap.yml — Nacos Config 配置中心
# ============================================
# 优先级：bootstrap.yml > application.yml
# 作用：告诉服务"去 Nacos 哪里拉取远程配置"

spring:
  application:
    name: product-service               # 服务名（用于拼 Data ID）
  cloud:
    nacos:
      config:
        server-addr: localhost:8848     # Nacos 地址
        file-extension: yaml            # 配置文件格式（yaml / properties）
        # Day05 场景二：跨微服务共享配置
        shared-configs:
          - data-id: global-config.yaml  # 引入全局公共配置
            refresh: true                # 支持动态刷新
  profiles:
    active: dev                         # 激活环境 → Data ID: product-service-dev.yaml
